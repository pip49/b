
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 스마트 마스터</title>
    <style>
        /* 기본 레이아웃 설정 */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #67b26f;
            --accent-color: #8e44ad;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* 퀴즈 카드 디자인 */
        .quiz-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        /* 상단 컨트롤 패널 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .input-group { display: flex; gap: 8px; }

        input {
            padding: 12px 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            background: #fff;
        }
        input:focus { border-color: var(--primary-color); }
        .search-box input { flex: 1; }
        .go-to-box input { width: 90px; text-align: center; }

        /* 버튼 공통 스타일 */
        button {
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:active { transform: translateY(2px); }

        .btn-action {
            padding: 12px 20px;
            background: var(--secondary-color);
            color: white;
            font-size: 0.9rem;
        }
        .btn-go { background: var(--accent-color); }

        /* 모드 전환 토글 */
        .mode-switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #f8fafc;
            border-radius: 12px;
        }
        .mode-label { font-size: 0.85rem; font-weight: 800; color: #64748b; }
        .btn-mode {
            padding: 6px 14px;
            font-size: 0.8rem;
            background: #e2e8f0;
            color: #475569;
        }
        .btn-mode.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        /* 문제 영역 */
        #quiz-count { font-size: 0.85rem; color: var(--primary-color); font-weight: 700; margin-bottom: 10px; }
        .question-area {
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 140px;
            margin-bottom: 25px;
            line-height: 1.6;
            word-break: keep-all;
            color: #1a202c;
        }

        /* 정답 영역 */
        .answer-area {
            display: none;
            background: #f1f5f9;
            border-left: 5px solid var(--primary-color);
            padding: 20px;
            border-radius: 12px;
            color: #334155;
            margin-bottom: 25px;
            font-size: 1rem;
            line-height: 1.6;
        }

        /* 하단 메인 네비게이션 버튼 */
        .buttons { display: flex; gap: 12px; }
        .btn-main { flex: 1; padding: 16px; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-prev { background: #94a3b8; color: white; }
        .btn-show { background: #334155; color: white; }
        .btn-next { background: var(--primary-color); color: white; }

        /* 반응형 모바일 최적화 */
        @media (max-width: 480px) {
            .quiz-card { padding: 20px; }
            .question-area { font-size: 1.1rem; }
            .btn-main { padding: 14px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="control-panel">
        <div class="input-group search-box">
            <input type="text" id="searchInput" placeholder="키워드 검색 (예: 원자, 콘덴서)" onkeyup="if(window.event.keyCode==13){searchQuiz()}">
            <button class="btn-action" onclick="searchQuiz()">검색</button>
        </div>
        <div class="input-group go-to-box">
            <input type="number" id="pageInput" placeholder="문제번호" onkeyup="if(window.event.keyCode==13){goToQuiz()}">
            <button class="btn-action btn-go" onclick="goToQuiz()">이동</button>
        </div>
    </div>

    <div class="mode-switch">
        <span class="mode-label">학습 환경 설정</span>
        <button id="modeBtn" class="btn-mode" onclick="toggleMode()">랜덤 모드</button>
    </div>

    <div id="quiz-count"></div>
    <div class="question-area" id="questionBox">데이터를 불러오는 중입니다...</div>

    <div class="answer-area" id="answerBox">
        <div style="margin-bottom: 8px; font-weight: 800; color: var(--primary-color);">[ 학습 해설 ]</div>
        <span id="answerText"></span>
    </div>

    <div class="buttons">
        <button class="btn-main btn-prev" onclick="prevQuiz()" id="prevBtn" style="display: none;">이전</button>
        <button class="btn-main btn-show" onclick="showAnswer()">정답 확인</button>
        <button class="btn-main btn-next" onclick="nextQuiz()">다음 문제</button>
    </div>
</div>

<script src="data.js"></script>

<script>
    let history = [];
    let currentHistoryIndex = -1;
    let isRandomMode = true;
    let sequentialIndex = 0;
    let currentAnswer = "";

    function goToQuiz() {
        const input = document.getElementById('pageInput');
        const num = parseInt(input.value);
        if (isNaN(num) || num < 1 || num > quizData.length) {
            alert(`1부터 ${quizData.length} 사이의 숫자를 입력해주세요.`);
            return;
        }
        const targetIndex = num - 1;
        if (isRandomMode) {
            history.push(targetIndex);
            currentHistoryIndex = history.length - 1;
        } else {
            sequentialIndex = targetIndex + 1;
        }
        displayQuiz(targetIndex);
        updatePrevButton();
        input.value = '';
    }

    function searchQuiz() {
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) {
            alert("검색어를 입력하세요.");
            return;
        }
        const foundIndex = quizData.findIndex(item =>
            item[0].includes(keyword) || (item[1] && item[1].includes(keyword))
        );
        if (foundIndex !== -1) {
            if (isRandomMode) {
                history.push(foundIndex);
                currentHistoryIndex = history.length - 1;
            } else {
                sequentialIndex = foundIndex + 1;
            }
            displayQuiz(foundIndex);
            updatePrevButton();
        } else {
            alert("해당 키워드가 포함된 문제를 찾을 수 없습니다.");
        }
    }

    function toggleMode() {
        isRandomMode = !isRandomMode;
        const modeBtn = document.getElementById('modeBtn');
        if (isRandomMode) {
            modeBtn.innerText = "랜덤 모드";
            modeBtn.classList.remove('active');
            history = [];
            currentHistoryIndex = -1;
        } else {
            modeBtn.innerText = "순차 모드";
            modeBtn.classList.add('active');
            sequentialIndex = 0;
        }
        nextQuiz();
    }

    function nextQuiz() {
        if (typeof quizData === 'undefined') return;
        if (isRandomMode) {
            if (currentHistoryIndex >= history.length - 1) {
                const randomIndex = Math.floor(Math.random() * quizData.length);
                history.push(randomIndex);
                currentHistoryIndex++;
            } else {
                currentHistoryIndex++;
            }
            displayQuiz(history[currentHistoryIndex]);
        } else {
            if (sequentialIndex < quizData.length) {
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            } else {
                alert("마지막 문제입니다. 처음부터 다시 시작합니다.");
                sequentialIndex = 0;
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            }
        }
        updatePrevButton();
    }

    function prevQuiz() {
        if (isRandomMode) {
            if (currentHistoryIndex > 0) {
                currentHistoryIndex--;
                displayQuiz(history[currentHistoryIndex]);
            }
        } else {
            if (sequentialIndex > 1) {
                sequentialIndex -= 2;
                if (sequentialIndex < 0) sequentialIndex = 0;
                nextQuiz();
            }
        }
        updatePrevButton();
    }

    function displayQuiz(index) {
        const selected = quizData[index];
        const question = selected[0];
        currentAnswer = selected[1] || "";

        document.getElementById('questionBox').innerHTML = question;
        document.getElementById('answerBox').style.display = 'none';

        const modeText = isRandomMode ? "랜덤" : "순차";
        document.getElementById('quiz-count').innerText = `[${modeText}] ${index + 1} / ${quizData.length}`;
        window.scrollTo(0, 0);
    }

    function updatePrevButton() {
        const prevBtn = document.getElementById('prevBtn');
        const canGoBack = isRandomMode ? (currentHistoryIndex > 0) : (sequentialIndex > 1);
        prevBtn.style.display = canGoBack ? 'block' : 'none';
    }

    function showAnswer() {
        if (currentAnswer.endsWith(".html")) {
            window.open(currentAnswer, '_blank');
        } else {
            const answerBox = document.getElementById('answerBox');
            const answerText = document.getElementById('answerText');
            answerText.innerHTML = currentAnswer;
            answerBox.style.display = (answerBox.style.display === 'block') ? 'none' : 'block';
        }
    }

    window.onload = nextQuiz;
</script>

</body>
</html>
