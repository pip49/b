
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>별도 js 전기기능사 문제풀이</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card {
            background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 500px; box-sizing: border-box; margin-top: 20px;
        }
        .control-panel { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .search-box, .go-to-box { display: flex; gap: 5px; }

        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 0.9rem; }
        .search-box input { flex: 1; }
        .go-to-box input { width: 80px; text-align: center; }

        button { cursor: pointer; transition: 0.2s; border: none; border-radius: 8px; font-weight: bold; }
        .btn-action { padding: 10px; background: #27ae60; color: white; font-size: 0.9rem; min-width: 60px; }
        .btn-go { background: #8e44ad; color: white; }

        .mode-switch { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 5px; align-items: center; }
        .mode-label { font-size: 0.85rem; font-weight: bold; color: #555; }

        .question-area { font-size: 1.1rem; min-height: 150px; margin-bottom: 20px; line-height: 1.7; }
        .answer-area {
            display: none; background: #f8f9fa; border: 1px dashed #3498db; padding: 15px;
            border-radius: 8px; color: #2c3e50; margin-bottom: 20px; font-size: 1rem; line-height: 1.6; word-break: keep-all;
        }
        .buttons { display: flex; gap: 10px; }
        .btn-main { flex: 1; padding: 15px; font-size: 1rem; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-show { background: #34495e; color: white; }
        .btn-next { background: #3498db; color: white; }
        .btn-mode { flex: none; padding: 5px 10px; font-size: 0.75rem; background: #ecf0f1; color: #7f8c8d; border: 1px solid #bdc3c7; }
        .btn-mode.active { background: #2ecc71; color: white; border-color: #27ae60; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="control-panel">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="내용 검색..." onkeyup="if(window.event.keyCode==13){searchQuiz()}">
            <button class="btn-action" onclick="searchQuiz()">검색</button>
        </div>
        <div class="go-to-box">
            <input type="number" id="pageInput" placeholder="번호" onkeyup="if(window.event.keyCode==13){goToQuiz()}">
            <button class="btn-action btn-go" onclick="goToQuiz()">이동</button>
            <span style="font-size: 0.8rem; color: #888; align-self: center;">번 문제로 이동</span>
        </div>
    </div>

    <div class="mode-switch">
        <span class="mode-label">모드:</span>
        <button id="modeBtn" class="btn-mode" onclick="toggleMode()">랜덤 모드</button>
    </div>

    <div id="quiz-count" style="font-size: 0.8rem; color: #888; margin-bottom: 5px;"></div>
    <div class="question-area" id="questionBox">문제를 불러오는 중입니다...</div>

    <div class="answer-area" id="answerBox">
        <strong>정답:</strong> <span id="answerText"></span>
    </div>

    <div class="buttons">
        <button class="btn-main btn-prev" onclick="prevQuiz()" id="prevBtn" style="display: none;">이전</button>
        <button class="btn-main btn-show" onclick="showAnswer()">정답 확인</button>
        <button class="btn-main btn-next" onclick="nextQuiz()">다음 문제</button>
    </div>
</div>

<script src="data.js"></script>

<script>
    let history = [];
    let currentHistoryIndex = -1;
    let isRandomMode = true;
    let sequentialIndex = 0;
    let currentAnswer = ""; // 현재 문제의 정답 데이터를 보관할 변수

    function goToQuiz() {
        const input = document.getElementById('pageInput');
        const num = parseInt(input.value);
        if (isNaN(num) || num < 1 || num > quizData.length) {
            alert(`1부터 ${quizData.length} 사이의 숫자를 입력해주세요.`);
            return;
        }
        const targetIndex = num - 1;
        if (isRandomMode) {
            history.push(targetIndex);
            currentHistoryIndex = history.length - 1;
        } else {
            sequentialIndex = targetIndex + 1;
        }
        displayQuiz(targetIndex);
        updatePrevButton();
        input.value = '';
    }

    function searchQuiz() {
        const keyword = document.getElementById('searchInput').value.trim();
        if (!keyword) {
            alert("검색어를 입력하세요.");
            return;
        }
        const foundIndex = quizData.findIndex(item =>
            item[0].includes(keyword) || (item[1] && item[1].includes(keyword))
        );
        if (foundIndex !== -1) {
            if (isRandomMode) {
                history.push(foundIndex);
                currentHistoryIndex = history.length - 1;
            } else {
                sequentialIndex = foundIndex + 1;
            }
            displayQuiz(foundIndex);
            updatePrevButton();
        } else {
            alert("해당 키워드가 포함된 문제를 찾을 수 없습니다.");
        }
    }

    function toggleMode() {
        isRandomMode = !isRandomMode;
        const modeBtn = document.getElementById('modeBtn');
        if (isRandomMode) {
            modeBtn.innerText = "랜덤 모드";
            modeBtn.classList.remove('active');
            history = [];
            currentHistoryIndex = -1;
        } else {
            modeBtn.innerText = "순차 모드";
            modeBtn.classList.add('active');
            sequentialIndex = 0;
        }
        nextQuiz();
    }

    function nextQuiz() {
        if (typeof quizData === 'undefined') return;
        if (isRandomMode) {
            if (currentHistoryIndex >= history.length - 1) {
                const randomIndex = Math.floor(Math.random() * quizData.length);
                history.push(randomIndex);
                currentHistoryIndex++;
            } else {
                currentHistoryIndex++;
            }
            displayQuiz(history[currentHistoryIndex]);
        } else {
            if (sequentialIndex < quizData.length) {
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            } else {
                alert("마지막 문제입니다. 처음부터 다시 시작합니다.");
                sequentialIndex = 0;
                displayQuiz(sequentialIndex);
                sequentialIndex++;
            }
        }
        updatePrevButton();
    }

    function prevQuiz() {
        if (isRandomMode) {
            if (currentHistoryIndex > 0) {
                currentHistoryIndex--;
                displayQuiz(history[currentHistoryIndex]);
            }
        } else {
            if (sequentialIndex > 1) {
                sequentialIndex -= 2;
                if (sequentialIndex < 0) sequentialIndex = 0;
                nextQuiz();
            }
        }
        updatePrevButton();
    }

    function displayQuiz(index) {
        const selected = quizData[index];
        const question = selected[0];
        currentAnswer = selected[1] || ""; // 정답 데이터를 변수에 저장

        document.getElementById('questionBox').innerHTML = question;
        document.getElementById('answerBox').style.display = 'none'; // 새 문제 시 정답창 숨김

        const modeText = isRandomMode ? "랜덤" : "순차";
        document.getElementById('quiz-count').innerText = `[${modeText}] 전체 ${quizData.length}문항 중 ${index + 1}번 확인 중`;
        window.scrollTo(0, 0);
    }

    function updatePrevButton() {
        const prevBtn = document.getElementById('prevBtn');
        const canGoBack = isRandomMode ? (currentHistoryIndex > 0) : (sequentialIndex > 1);
        prevBtn.style.display = canGoBack ? 'block' : 'none';
    }

    // 정답 확인 버튼 로직 수정
    function showAnswer() {
        if (currentAnswer.endsWith(".html")) {
            // 파일 경로인 경우 새 창(탭)으로 열기
            window.open(currentAnswer, '_blank');
        } else {
            // 일반 텍스트인 경우 카드 내에서 토글
            const answerBox = document.getElementById('answerBox');
            const answerText = document.getElementById('answerText');
            answerText.innerHTML = currentAnswer;
            answerBox.style.display = (answerBox.style.display === 'block') ? 'none' : 'block';
        }
    }

    window.onload = nextQuiz;
</script>

</body>
</html>
